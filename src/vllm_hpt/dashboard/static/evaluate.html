<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM HPT Evaluate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f1419;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --accent-blue: #1d9bf0;
            --accent-green: #00ba7c;
            --accent-red: #f4212e;
            --accent-yellow: #ffd400;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(29, 155, 240, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 186, 124, 0.06) 0%, transparent 50%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-idle { background: var(--text-secondary); }
        .status-waiting { background: var(--accent-yellow); color: #000; }
        .status-evaluating { background: var(--accent-blue); }
        .status-done { background: var(--accent-green); }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        input[type="number"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: "SF Mono", Monaco, monospace;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(29, 155, 240, 0.1);
        }

        button.primary-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.primary-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3);
        }

        button.primary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--text-secondary);
        }

        button.secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 16px;
        }

        button.secondary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Progress Styles (Reused/Adapted) */
        .progress-bar-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* Results Styles */
        .results-hero {
            text-align: center;
            padding: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-glass);
        }

        .accuracy-value {
            font-size: 64px;
            font-weight: 800;
            color: var(--accent-green);
            line-height: 1;
            margin-bottom: 8px;
        }

        .accuracy-label {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .stat-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .file-path {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 11px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            margin-top: 20px;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-glass);
            font-size: 11px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-glass);
            color: var(--text-primary);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Connection Dot */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
        }

        .connection-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
        }

        /* Utility */
        .hidden { display: none !important; }
        
        .params-display-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
        }
        
        .param-display-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .param-display-name {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .param-display-value {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 14px;
            font-weight: 600;
        }

        /* Model Status */
        .model-status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-glass);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-ok { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
        .status-error { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
        .status-unknown { background: var(--text-secondary); }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .accuracy-value { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                vLLM HPT Evaluate
                <span id="mode-badge" class="status-badge status-idle">IDLE</span>
            </h1>
            <div class="connection-status">
                <div id="connection-dot" class="connection-dot"></div>
                <span id="connection-text">Disconnected</span>
            </div>
        </header>


        <div id="section-params" class="glass-card">
            <div class="card-title">Sampling Parameters</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
                </div>
                <div class="form-group">
                    <label for="top_p">Top P</label>
                    <input type="number" id="top_p" value="0.9" min="0" max="1" step="0.05">
                </div>
                <div class="form-group">
                    <label for="top_k">Top K</label>
                    <input type="number" id="top_k" value="50" min="-1" max="100" step="1">
                </div>
                <div class="form-group">
                    <label for="repetition_penalty">Repetition Penalty</label>
                    <input type="number" id="repetition_penalty" value="1.0" min="1" max="2" step="0.1">
                </div>
                <div class="form-group">
                    <label for="max_tokens">Max Tokens</label>
                    <input type="number" id="max_tokens" value="512" min="1" max="2048" step="1">
                </div>
            </div>
            <button id="start-btn" class="primary-btn" onclick="startEvaluation()">Start Evaluation</button>
        </div>


        <div id="section-progress" class="glass-card hidden">
            <div class="card-title">Evaluation Progress</div>
            <div class="progress-text">
                <span>Test Split</span>
                <span id="progress-text">0 / 0</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            
            <div class="card-title" style="margin-top: 24px;">Current Configuration</div>
            <div id="progress-params" class="params-display-grid">
            </div>

            <div class="model-status-indicator">
                <div id="model-status-dot" class="status-dot status-unknown"></div>
                <span id="model-status-text">Checking Model Status...</span>
            </div>
        </div>


        <div id="section-results" class="glass-card hidden">
            <div class="card-title">Evaluation Results</div>
            
            <div class="results-hero">
                <div id="result-accuracy" class="accuracy-value">0.00%</div>
                <div class="accuracy-label">Accuracy</div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div id="result-correct" class="stat-value">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat-item">
                    <div id="result-total" class="stat-value">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div id="result-wrong" class="stat-value">0</div>
                    <div class="stat-label">Wrong</div>
                </div>
                <div class="stat-item">
                    <div id="result-parse-fail" class="stat-value">0</div>
                    <div class="stat-label">Parse Fail</div>
                </div>
            </div>

            <div class="card-title">Parameters Used</div>
            <div id="result-params" class="params-display-grid" style="margin-bottom: 24px;">
            </div>

            <div class="card-title">Wrong Answers Sample</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Model Answer</th>
                            <th>Correct Answer</th>
                        </tr>
                    </thead>
                    <tbody id="wrong-sample-body">
                    </tbody>
                </table>
            </div>

            <div id="result-file" class="file-path">File: ...</div>

            <div style="text-align: center; margin-top: 24px;">
                <button class="secondary-btn" onclick="resetToParams()">Run Again</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectTimeout = null;
        let lastState = null;

        const sections = {
            params: document.getElementById('section-params'),
            progress: document.getElementById('section-progress'),
            results: document.getElementById('section-results')
        };

        const badge = document.getElementById('mode-badge');

        function setConnectionStatus(connected) {
            const dot = document.getElementById('connection-dot');
            const text = document.getElementById('connection-text');
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Disconnected';
            }
        }

        function showSection(sectionName) {
            Object.values(sections).forEach(el => el.classList.add('hidden'));
            sections[sectionName].classList.remove('hidden');
        }

        function renderParams(params, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (!params) return;

            Object.entries(params).forEach(([key, value]) => {
                const div = document.createElement('div');
                div.className = 'param-display-item';
                div.innerHTML = `
                    <div class="param-display-name">${key}</div>
                    <div class="param-display-value">${value}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateUI(state) {
            lastState = state;
            
            // Update Badge
            let modeDisplay = state.mode;
            if (state.mode === 'waiting_params') modeDisplay = 'Waiting';
            if (state.mode === 'eval_done') modeDisplay = 'Done';
            
            badge.textContent = modeDisplay;
            badge.className = 'status-badge';
            
            if (state.mode === 'evaluating') badge.classList.add('status-evaluating');
            else if (state.mode === 'eval_done') badge.classList.add('status-done');
            else if (state.mode === 'waiting_params') badge.classList.add('status-waiting');
            else badge.classList.add('status-idle');

            // Switch Sections
            if (state.mode === 'waiting_params' || state.mode === 'idle') {
                showSection('params');
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.textContent = "Start Evaluation";
            } else if (state.mode === 'evaluating') {
                showSection('progress');
                
                // Update Progress
                const current = state.current_question || 0;
                const total = state.total_questions || 1;
                const pct = Math.min(100, (current / total) * 100);
                
                document.getElementById('progress-text').textContent = `${current} / ${total}`;
                document.getElementById('progress-fill').style.width = `${pct}%`;
                
                renderParams(state.current_params, 'progress-params');

                // Update Model Status
                const modelStatus = state.exam_model || { status: 'unknown', name: 'Unknown' };
                const statusDot = document.getElementById('model-status-dot');
                const statusText = document.getElementById('model-status-text');
                
                statusDot.className = `status-dot status-${modelStatus.status || 'unknown'}`;
                statusText.textContent = `${modelStatus.name} (${modelStatus.status})`;

            } else if (state.mode === 'eval_done') {
                showSection('results');
                
                const res = state.eval_result || {};
                document.getElementById('result-accuracy').textContent = (res.accuracy ? (res.accuracy * 100).toFixed(2) : '0.00') + '%';
                document.getElementById('result-correct').textContent = res.correct || 0;
                document.getElementById('result-total').textContent = res.total || 0;
                document.getElementById('result-wrong').textContent = (res.total - res.correct) || 0;
                document.getElementById('result-parse-fail').textContent = res.parse_failures || 0;
                document.getElementById('result-file').textContent = 'File: ' + (state.eval_result_file || 'N/A');

                renderParams(state.current_params, 'result-params');

                // Render Wrong Samples Table
                const tbody = document.getElementById('wrong-sample-body');
                tbody.innerHTML = '';
                if (res.wrong_sample && res.wrong_sample.length > 0) {
                    res.wrong_sample.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-family: monospace;">${row.id || '-'}</td>
                            <td>${row.model || '-'}</td>
                            <td style="color: var(--accent-green)">${row.correct || '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);">No samples available</td></tr>';
                }
            }
        }

        async function startEvaluation() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.textContent = "Starting...";

            const params = {
                temperature: parseFloat(document.getElementById('temperature').value),
                top_p: parseFloat(document.getElementById('top_p').value),
                top_k: parseInt(document.getElementById('top_k').value),
                repetition_penalty: parseFloat(document.getElementById('repetition_penalty').value),
                max_tokens: parseInt(document.getElementById('max_tokens').value)
            };

            try {
                const response = await fetch('/api/start-evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ params })
                });
                
                if (!response.ok) {
                    throw new Error('Start failed');
                }
                // WebSocket will handle the transition
            } catch (e) {
                console.error(e);
                alert('Failed to start evaluation: ' + e.message);
                btn.disabled = false;
                btn.textContent = "Start Evaluation";
            }
        }

        function resetToParams() {
            // Optimistically switch to params view
            // In a real app we might send a "reset" signal to backend, 
            // but here we just show the form again and let the user submit new params.
            // If the backend is still "eval_done", it might push that state again on reconnect,
            // but for a simple flow this works. 
            // Better: We rely on the fact that submitting new params will shift backend state.
            // But we visually need to see the form.
            showSection('params');
            
            // Restore last used params if available in state
            if (lastState && lastState.current_params) {
                const p = lastState.current_params;
                if(p.temperature) document.getElementById('temperature').value = p.temperature;
                if(p.top_p) document.getElementById('top_p').value = p.top_p;
                if(p.top_k) document.getElementById('top_k').value = p.top_k;
                if(p.repetition_penalty) document.getElementById('repetition_penalty').value = p.repetition_penalty;
                if(p.max_tokens) document.getElementById('max_tokens').value = p.max_tokens;
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + window.location.host + '/ws');

            ws.onopen = () => {
                setConnectionStatus(true);
                if (reconnectTimeout) {
                    clearTimeout(reconnectTimeout);
                    reconnectTimeout = null;
                }
            };

            ws.onmessage = (event) => {
                try {
                    const state = JSON.parse(event.data);
                    updateUI(state);
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            ws.onclose = () => {
                setConnectionStatus(false);
                reconnectTimeout = setTimeout(connect, 2000);
            };

            ws.onerror = () => {
                ws.close();
            };
        }

        // Initialize
        connect();
    </script>
</body>
</html>
